 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Assignment Writer</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Caveat&family=Gloria+Hallelujah&family=Gochi+Hand&family=Kalam&family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    #editor {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 250px;
    }

    .controls label {
        font-weight: bold;
    }

    #canvas-container {
        position: relative;
        display: inline-block;
    }

    #canvas-container img {
        display: block;
        width: auto;
        max-width: 90vw;
        height: auto;
    }

    #text-layer {
        position: absolute;
        top: 10%;
        left: 10%;
        white-space: pre-wrap;
        cursor: grab;
        user-select: none;
        color: black;
        font-size: 5vw;
        line-height: 1.2;
        border: 1px dashed #333;
        padding: 5px;
        transform: rotate(0deg); /* initial rotation */
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 6px;
        background: #26a69a;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    button:hover {
        background: #00796b;
    }
</style>
</head>
<body>

<h1>🎓 Online Assignment Writer</h1>

<div id="editor">
    <div class="controls">
        <label>Upload Image:</label>
        <input type="file" id="bg-upload" accept="image/*">

        <label>Enter Text:</label>
        <textarea id="text-input" rows="3">Hello!</textarea>

        <label>Font Style:</label>
        <select id="font-select">
            <option value="Caveat">Caveat</option>
            <option value="Gloria Hallelujah">Gloria Hallelujah</option>
            <option value="Gochi Hand">Gochi Hand</option>
            <option value="Kalam">Kalam</option>
            <option value="Patrick Hand">Patrick Hand</option>
        </select>

        <label>Text Color:</label>
        <input type="color" id="color-picker" value="#000000">

        <label>Line Spacing:</label>
        <input type="range" id="line-spacing" min="0.5" max="3" step="0.1" value="1.2">

        <!-- Added rotate slider -->
        <label>Rotate Text:</label>
        <input type="range" id="rotation-slider" min="-45" max="45" step="1" value="0">

        <button id="download-btn">📸 Download Preview</button>
    </div>

    <div id="canvas-container">
        <img id="bg-img" src="" alt="Uploaded Image">
        <div id="text-layer">Hello!</div>
    </div>
</div>

<!-- html2canvas for download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const bgUpload = document.getElementById("bg-upload");
    const bgImg = document.getElementById("bg-img");
    const textLayer = document.getElementById("text-layer");
    const textInput = document.getElementById("text-input");
    const fontSelect = document.getElementById("font-select");
    const colorPicker = document.getElementById("color-picker");
    const lineSpacing = document.getElementById("line-spacing");
    const downloadBtn = document.getElementById("download-btn");
    const rotationSlider = document.getElementById("rotation-slider");

    // Upload image
    bgUpload.addEventListener("change", e=>{
        const file = e.target.files[0];
        if(file){
            bgImg.src = URL.createObjectURL(file);
            bgImg.onload = () => {
                document.getElementById("canvas-container").style.width = bgImg.width + "px";
                document.getElementById("canvas-container").style.height = bgImg.height + "px";
            };
        }
    });

    // Update text
    textInput.addEventListener("input", ()=>{ textLayer.textContent = textInput.value; });
    fontSelect.addEventListener("change", ()=>{ textLayer.style.fontFamily = fontSelect.value; });
    colorPicker.addEventListener("input", ()=>{ textLayer.style.color = colorPicker.value; });
    lineSpacing.addEventListener("input", ()=>{ textLayer.style.lineHeight = lineSpacing.value; });

    // Rotate text
    rotationSlider.addEventListener("input", ()=>{
        textLayer.style.transform = `rotate(${rotationSlider.value}deg)`;
    });

    // Drag & Move
    let isDragging = false;
    let offsetX, offsetY;
    textLayer.addEventListener("mousedown", e=>{
        isDragging = true;
        offsetX = e.clientX - textLayer.offsetLeft;
        offsetY = e.clientY - textLayer.offsetTop;
        textLayer.style.cursor = "grabbing";
    });
    window.addEventListener("mousemove", e=>{
        if(isDragging){
            textLayer.style.left = (e.clientX - offsetX) + "px";
            textLayer.style.top = (e.clientY - offsetY) + "px";
        }
    });
    window.addEventListener("mouseup", ()=>{
        if(isDragging){
            isDragging = false;
            textLayer.style.cursor = "grab";
        }
    });

    // Zoom with wheel
    textLayer.addEventListener("wheel", e=>{
        e.preventDefault();
        let size = parseFloat(window.getComputedStyle(textLayer).fontSize);
        size += (e.deltaY<0)?2:-2;
        if(size<10) size=10;
        textLayer.style.fontSize = size + "px";
    });

    // Download preview without dashed border
    downloadBtn.addEventListener("click", ()=>{
        textLayer.style.border = "none"; // hide border
        html2canvas(document.getElementById("canvas-container")).then(canvas=>{
            const link = document.createElement("a");
            link.download = "assignment_preview.png";
            link.href = canvas.toDataURL();
            link.click();
            textLayer.style.border = "1px dashed #333"; // restore border
        });
    });

    // Initial font
    textLayer.style.fontFamily = fontSelect.value;
</script>

</body>
</html>
