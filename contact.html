<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | TextToNotes - Text to Structured Notes Converter</title>
    <meta name="description" content="Get in touch with TextToNotes - Contact our support team at support@texttonotes.site for any questions or feedback.">
    <link rel="canonical" href="https://www.texttonotes.site/contact" />
    <link rel="stylesheet" href="styles.css"> <!-- Assuming a styles.css exists to match the responsive design -->
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="privacy.html">Privacy Policy</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Contact Us</h1>
        <form action="/submit-contact" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 TextToNotes. All rights reserved.</p>
    </footer>
</body>
</html>
